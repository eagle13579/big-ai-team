# 核心资产隔离开发与自动检测配置文件
repos:
-   repo: local
    hooks:
    -   id: core-asset-protection
        name: 核心资产隔离预处理与自动检测
        # 触发你的核心脚本，进行资产隔离处理
        entry: python scripts/tools/build_protect.py
        language: system
        always_run: true
        pass_filenames: false

    -   id: forbid-raw-core-files
        name: 拦截原始核心代码泄露
        # 核心逻辑：如果在提交的文件中发现以 .raw.py 结尾的文件，直接拦截
        # 你可以根据实际情况修改后缀名，如 .secret, .src 等
        entry: python -c "import sys; sys.exit(1 if any(f.endswith('.raw.py') for f in sys.argv[1:]) else 0)"
        language: python
        files: ^core/  # 仅监控 core/ 文件夹下的内容