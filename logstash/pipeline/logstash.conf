input {
  file {
    path => ["/app/logs/*.json"]
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => json
  }
  tcp {
    port => 5044
    codec => json
  }
}

filter {
  if [message] {
    json {
      source => "message"
      remove_field => ["message"]
    }
  }
  date {
    match => ["timestamp", "yyyy-MM-dd HH:mm:ss.SSS"]
    target => "@timestamp"
  }
  mutate {
    remove_field => ["@version"]
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "elastic123"
    index => "ace-agent-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}