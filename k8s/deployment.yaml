apiVersion: apps/v1
kind: Deployment
metadata:
  name: big-ai-team
  namespace: big-ai-team
  labels:
    app: big-ai-team
spec:
  replicas: 3
  selector:
    matchLabels:
      app: big-ai-team
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: big-ai-team
    spec:
      containers:
      - name: big-ai-team
        image: ghcr.io/${{ github.repository }}/big-ai-team:__IMAGE_TAG__
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: big-ai-team-config
        - secretRef:
            name: big-ai-team-secrets
        resources:
          requests:
            cpu: "500m"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "1Gi"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30