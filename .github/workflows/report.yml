name: "Project Report"

on:
  workflow_run:
    workflows: ["Production-Grade AI Core Protection Pipeline"]
    types: [completed]
  push:
    branches: [main]

jobs:
  summary:
    name: "📝 Final Summary"
    runs-on: ubuntu-latest
    steps:
      - name: "📝 Generate Run Summary"
        run: |
          echo "## 🚀 构建流水线最终报告" >> $GITHUB_STEP_SUMMARY
          echo "- **项目仓库**: \`${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **最终结论**: ${{ github.event.workflow_run.conclusion == 'success' && '✅ 成功 (SUCCESS)' || '❌ 失败 (FAILED)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **完成时间**: $(date)" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ github.event.workflow_run.conclusion }}" == "success" ]; then
            echo "### 🛡️ 安全状态：已加固" >> $GITHUB_STEP_SUMMARY
            echo "✅ 核心代码已完成二进制转换。" >> $GITHUB_STEP_SUMMARY
            echo "✅ 源码残留审计已通过。" >> $GITHUB_STEP_SUMMARY
            echo "✅ 产物已上传至 Artifacts。" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ⚠️ 风险警报" >> $GITHUB_STEP_SUMMARY
            echo "❌ 构建中断。请立即检查主流水线中的 **Step 4 (测试)** 或 **Step 6 (审计)**。" >> $GITHUB_STEP_SUMMARY
          fi

  update-validation-report:
    name: "🔍 Update Module Validation Report"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: "🔍 Run Validation Script"
        run: python src/lib/core/memory/validate_file_locations.py

      - name: "📤 Commit Updated Report"
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add memory/module_validation_report.md
          git commit -m "Update module validation report" || echo "No changes to commit"
          git push origin main || echo "Push failed"