name: "Production-Grade AI Core Protection Pipeline"

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# 核心权限控制：允许机器人推送校验报告与代码修复
permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  # 并行执行测试和构建准备
  test-and-prepare:
    name: "🧪 Tests & Preparation"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: [ '3.12' ]  # 使用最新的 Python 版本
    
    steps:
      - name: "Step 1: Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: "Step 2: Setup Python & Cache"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: "Step 3: High-Performance Environment Setup"
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # 安装 Nova 推荐的核心工具链
          pip install nuitka zstandard ruff pytest pytest-cov
          if [ -f "requirements.txt" ]; then pip install -r requirements.txt; fi
          sudo apt-get update && sudo apt-get install -y build-essential ccache

      - name: "Step 4: Nova Intelligent Auto-Fix (Ruff)"
        run: |
          # 运行自动化修复脚本
          if [ -f "scripts/auto_fix.py" ]; then
            python scripts/auto_fix.py
          else
            ruff check . --fix --unsafe-fixes --show-fixes --target-version=py312
            ruff format .
          fi

      - name: "Step 5: Run Tests in Parallel"
        run: |
          # 并行运行测试以减少时间
          pytest --cov=core --cov-report=term-missing tests/ -n auto
          
          # 生成自动化校验报告
          echo "### 📊 Module Validation Report" > module_validation_report.md
          echo "- **Generated on:** $(date)" >> module_validation_report.md
          echo "- **Status:** Source Code Validated ✅" >> module_validation_report.md
          echo "STATUS=SUCCESS" >> $GITHUB_ENV

      - name: "Step 6: Commit Changes & Report"
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          
          # 提交自动修复后的代码和验证报告
          git add .
          git commit -m "chore: auto-fix & update validation report [skip ci]" || exit 0
          git push

  # 构建核心代码
  build-core:
    name: "🔧 Build Core"
    runs-on: ubuntu-latest
    needs: test-and-prepare
    timeout-minutes: 15
    
    steps:
      - name: "Step 1: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Step 2: Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: "Step 3: Execute Nuitka Hardening"
        run: |
          # 执行模块化加密编译，将 core 目录转为二进制
          if [ -f "build_protect.py" ]; then
            python build_protect.py
          else
            python -m nuitka --module core/ --output-dir=dist --show-progress --remove-output
            # 关键步骤：用编译后的文件替换源码（模拟脱敏环境）
            cp -r dist/core/* core/ 2>/dev/null || true
          fi
        env:
          CCACHE_DIR: ~/.ccache
          FORCE_UNSAFE_CONFIGURE: 1

      - name: "Step 4: Binary Integrity Check (Nova Smoke Test)"
        run: |
          echo "🔍 正在验证脱敏后的二进制文件加载..."
          # 运行冒烟测试脚本
          if [ -f "tests/test_protected_core.py" ]; then
            python tests/test_protected_core.py
          else
            python -c "import core; print('✅ Core Package Loaded Successfully')"
          fi

      - name: "Step 5: Cleanup & Security Audit"
        run: |
          # [安全铁律] 检查 core 目录下是否还残留非 __init__.py 的源码
          RESIDUAL_PY=$(find core -name "*.py" | grep -v "__init__.py" | wc -l)
          if [ "$RESIDUAL_PY" -gt 0 ]; then
            echo "❌ Critical Security Error: $RESIDUAL_PY source files still exist in core!"
            exit 1
          fi
          echo "✅ Security Check Passed: Source code stripped, only binaries remain."

  # 构建并推送 Docker 镜像
  docker-build-and-push:
    name: "🐳 Docker Build & Push"
    runs-on: ubuntu-latest
    needs: build-core
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: "Step 1: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Step 2: Set up Docker Buildx"
        uses: docker/setup-buildx-action@v3

      - name: "Step 3: Login to GitHub Container Registry"
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Step 4: Build and push Docker image"
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/big-ai-team:${{ github.sha }}
            ghcr.io/${{ github.repository }}/big-ai-team:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 优化构建速度
          build-args: |
            PYTHON_VERSION=3.12
          # 使用多阶段构建
          dockerfile: Dockerfile

  # 部署到 Kubernetes
  deploy-to-kubernetes:
    name: "🚢 Deploy to Kubernetes"
    runs-on: ubuntu-latest
    needs: docker-build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: "Step 1: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Step 2: Set up kubectl"
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: "Step 3: Configure Kubernetes context"
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=kubeconfig

      - name: "Step 4: Deploy to Kubernetes"
        run: |
          # 创建命名空间（如果不存在）
          kubectl create namespace big-ai-team || true
          
          # 替换 Kubernetes 配置文件中的镜像标签
          sed -i 's|__IMAGE_TAG__|${{ github.sha }}|g' k8s/deployment.yaml
          
          # 应用配置
          kubectl apply -f k8s/namespace.yaml -f k8s/configmap.yaml -f k8s/secrets.yaml -f k8s/deployment.yaml -f k8s/service.yaml
          
          # 等待部署完成
          kubectl rollout status deployment/big-ai-team -n big-ai-team --timeout=120s

  # 前端构建和测试（如果需要）
  frontend-build:
    name: "🖥️ Frontend Build"
    runs-on: ubuntu-latest
    needs: test-and-prepare
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    
    steps:
      - name: "Step 1: Checkout Repository"
        uses: actions/checkout@v4

      - name: "Step 2: Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: "Step 3: Install Frontend Dependencies"
        run: |
          cd frontend
          npm ci

      - name: "Step 4: Run Frontend Tests"
        run: |
          cd frontend
          npm test -- --watchAll=false

      - name: "Step 5: Build Frontend"
        run: |
          cd frontend
          npm run build

 